name: HFA Portal Auto Builder

on:
  push:
    branches:
      - main  # 👑 mainブランチにPushされた時だけ動く（無駄なデプロイを防止）
  workflow_dispatch: # 手動実行用

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run Builder (後で作る build.py を実行)
      # 👑 本番時はここで python build.py を動かして data.json を作ります
      run: |
        mkdir -p dist
        # 今回はテストなのでとりあえず index.html だけを dist にコピー
        cp index.html dist/

    - name: Deploy to Cloudflare Workers
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        npx wrangler deploy
